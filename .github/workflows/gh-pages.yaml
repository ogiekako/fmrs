name: Build and deploy github pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Set up Node
        uses: actions/setup-node@v2
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Install & Build
        env:
          FMRS_API_BASE_URL: https://fmrs-api-1045417562870.asia-northeast1.run.app
        run: |
          npm i
          npm run build
          rm ./docs/.gitignore
          rm ./docs/pkg/.gitignore
      - name: Preserve dev directory from gh-pages
        run: |
          git fetch origin gh-pages --depth 1 2>/dev/null || true
          git checkout FETCH_HEAD -- dev/ 2>/dev/null || true
          if [ -d dev ]; then
            mkdir -p docs/dev
            cp -r dev/. docs/dev/
          fi
      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4.7.2
        with:
          branch: gh-pages
          folder: docs
