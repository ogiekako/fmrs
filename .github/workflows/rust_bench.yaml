name: Rust Benchmark

on:
  workflow_run:
    workflows: ["Build and deploy github pages"]
    types:
      - completed
    branches:
      - main

defaults:
  run:
    working-directory: rust

permissions:
  contents: write
  deployments: write

jobs:
  benchmark-iai:
    name: Run iai-callgrind benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-iai-${{ hashFiles('**/Cargo.lock') }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Valgrind
        run: sudo apt-get install -y valgrind

      - name: Install iai-callgrind-runner
        run: |
          IAI_VERSION=$(cargo metadata --format-version 1 | python3 -c "
          import sys, json
          pkgs = json.load(sys.stdin)['packages']
          print(next(p['version'] for p in pkgs if p['name'] == 'iai-callgrind'))
          ")
          cargo install --locked iai-callgrind-runner --version "$IAI_VERSION"

      - name: Run iai-callgrind benchmarks
        run: |
          cargo bench --bench iai_bench -- --output-format=json 2>&1 | tee iai_output.txt
          python3 - <<'PY' > iai_results.json
          import json

          results = []
          with open('iai_output.txt') as f:
              for line in f:
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      data = json.loads(line)
                  except json.JSONDecodeError:
                      continue
                  if not isinstance(data, dict):
                      continue

                  function_name = data.get('function_name', '')
                  id_ = data.get('id')
                  name = function_name if (id_ is None or id_ == 'default') else f"{function_name}::{id_}"

                  for profile in data.get('profiles', []):
                      if profile.get('tool') != 'Callgrind':
                          continue
                      try:
                          callgrind = profile['summaries']['total']['summary']['Callgrind']
                          metrics = callgrind['Ir']['metrics']
                          if 'Left' in metrics:
                              value = metrics['Left']['Int']
                          elif 'Both' in metrics:
                              value = metrics['Both'][0]['Int']
                          else:
                              continue
                          results.append({"name": name, "value": value, "unit": "Instructions"})
                      except (KeyError, TypeError, IndexError):
                          pass
                      break

          print(json.dumps(results, indent=2))
          PY
          echo "=== iai-callgrind results ===" >&2
          cat iai_results.json >&2

      - name: Upload iai results
        uses: actions/upload-artifact@v4
        with:
          name: iai-results
          path: rust/iai_results.json

  benchmark-cargo:
    name: Run cargo benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-cargo-${{ hashFiles('**/Cargo.lock') }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Run benchmark (multiple rounds, take min)
        env:
          BENCH_RUNS: 3
        run: |
          rm -f bench_runs.txt
          for i in $(seq 1 "$BENCH_RUNS"); do
            echo "=== bench run $i/$BENCH_RUNS ===" >&2
            cargo bench -- --output-format bencher | tee -a bench_runs.txt
          done
          echo "=== extra bench (1 run) ===" >&2
          FMRS_ENABLE_EXTRA_BENCH=1 cargo bench -- --output-format bencher | tee -a bench_runs.txt
          # 各ベンチ名について最小 ns/iter を持つ行だけ output.txt に残す。
          # ノイズは常に「遅くする方向」に働くため min が真値に最も近い。
          python3 - <<'PY' > output.txt
          import re
          pat = re.compile(r'^test (\S+)\s+\.\.\. bench:\s+([\d,]+)\s+ns/iter')
          best = {}
          order = []
          with open('bench_runs.txt') as f:
              for raw in f:
                  line = raw.rstrip()
                  m = pat.match(line)
                  if not m:
                      continue
                  name = m.group(1)
                  ns = int(m.group(2).replace(',', ''))
                  if name not in best:
                      order.append(name)
                      best[name] = (ns, line)
                  elif ns < best[name][0]:
                      best[name] = (ns, line)
          for n in order:
              print(best[n][1])
          PY
          echo "=== aggregated (min per bench) ===" >&2
          cat output.txt >&2

      - name: Upload cargo results
        uses: actions/upload-artifact@v4
        with:
          name: cargo-results
          path: rust/output.txt

  store-results:
    name: Store benchmark results
    runs-on: ubuntu-latest
    needs: [benchmark-iai, benchmark-cargo]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download iai results
        uses: actions/download-artifact@v4
        with:
          name: iai-results

      - name: Download cargo results
        uses: actions/download-artifact@v4
        with:
          name: cargo-results

      - name: Store iai-callgrind results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Instruction Count (iai-callgrind)
          tool: customSmallerIsBetter
          output-file-path: iai_results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "105%"
          comment-on-alert: true
          fail-on-alert: true
          alert-comment-cc-users: "@ogiekako"

      - name: Store cargo benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Rust Benchmark
          tool: "cargo"
          output-file-path: output.txt
          # Note: output.txt contains the min ns/iter across BENCH_RUNS rounds.
          # 共有ランナーのノイズが片側分布である性質を利用して安定化している。
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "200%"
          comment-on-alert: true
          fail-on-alert: true
          alert-comment-cc-users: "@ogiekako"
